

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUKERHUB - Blue Edition | MAKINA Company</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #007bff; /* Azul vibrante */
            --bg: #050a12;
            --card: #0f172a;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- BLOQUEIOS --- */
        #ageGate, #authModal {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 9999;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .box-ui { 
            width: 90%; max-width: 400px; padding: 35px; 
            background: var(--card); border: 1px solid var(--primary); border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.2);
        }

        /* --- HEADER --- */
        .header { background: #0f172a; border-bottom: 3px solid var(--primary); padding: 15px 5%; position: sticky; top: 0; z-index: 1000; }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; }
        .logo { font-size: 26px; font-weight: 800; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }

        /* --- LAYOUT --- */
        .main-wrapper { 
            max-width: 1400px; margin: 20px auto; padding: 0 20px; display: flex; gap: 25px;
            filter: blur(15px); pointer-events: none; transition: 0.5s; 
        }
        .main-wrapper.unlocked { filter: blur(0); pointer-events: auto; }

        .sidebar { width: 220px; flex-shrink: 0; }
        .cat-btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: #1e293b; border: none; color: #94a3b8; text-align: left; cursor: pointer; border-radius: 6px; font-weight: 600; }
        .cat-btn.active, .cat-btn:hover { background: var(--primary); color: white; }

        /* --- UPLOAD & ADS --- */
        #uploadSection { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 25px; display: none; border-left: 4px solid var(--primary); }
        .ad-slot { grid-column: 1 / -1; background: #111827; height: 100px; border: 1px dashed var(--primary); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 12px; border-radius: 8px; }

        /* --- GRID DE VÍDEOS --- */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .v-card { background: var(--card); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #1e293b; }
        .v-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .v-thumb { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .v-info { padding: 12px; font-size: 14px; font-weight: 600; }

        /* --- PLAYER --- */
        .player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; align-items: center; justify-content: center; }
        .player-overlay.active { display: flex; flex-direction: column; }
        .p-container { width: 90%; max-width: 1100px; background: #000; }
        iframe, video { width: 100%; aspect-ratio: 16/9; }

        /* --- INPUTS --- */
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; background: #020617; border: 1px solid #334155; color: #fff; border-radius: 6px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="ageGate">
    <div class="box-ui">
        <h1 style="color:var(--primary)">DUKER<span>HUB</span></h1>
        <p style="margin: 20px 0">Conteúdo restrito para maiores de 18 anos.</p>
        <button class="btn-main" onclick="verifyAge()">SOU MAIOR DE 18</button>
    </div>
</div>

<div id="authModal" style="display:none;">
    <div class="box-ui">
        <h2 id="authTitle" style="margin-bottom:20px">Login</h2>
        <input type="email" id="uEmail" placeholder="Seu e-mail">
        <input type="password" id="uPass" placeholder="Sua senha">
        <button class="btn-main" onclick="handleAuth()" id="authBtn">ENTRAR</button>
        <p onclick="toggleAuth()" style="margin-top:15px; font-size:12px; cursor:pointer; color:var(--primary)">Criar nova conta</p>
    </div>
</div>

<header class="header">
    <div class="header-container">
        <a href="#" class="logo">DUKER<span>HUB</span></a>
        <div>
            <button class="btn-main" style="padding: 8px 15px; font-size: 13px;" onclick="toggleUpload()">+ POSTAR VÍDEO</button>
            <button onclick="logout()" style="background:none; border:1px solid #334155; color:white; padding:8px 12px; margin-left:10px; border-radius:6px; cursor:pointer;">SAIR</button>
        </div>
    </div>
</header>

<div class="main-wrapper" id="mainUI">
    <aside class="sidebar">
        <h4 style="margin-bottom:15px; color:var(--primary)">NAVEGAÇÃO</h4>
        <button class="cat-btn active" onclick="render('Tudo', this)">Tudo</button>
        <button class="cat-btn" onclick="render('Premium', this)">Premium</button>
        <button class="cat-btn" onclick="render('Amador', this)">Amador</button>
        <button class="cat-btn" onclick="render('Caseiro', this)">Caseiro</button>
    </aside>

    <main style="flex:1">
        <section id="uploadSection">
            <h3 style="margin-bottom:15px">Publicar Conteúdo</h3>
            <input type="text" id="vTitle" placeholder="Título do Vídeo">
            <select id="vCat">
                <option value="Amador">Amador</option>
                <option value="Caseiro">Caseiro</option>
                <option value="Premium">Premium</option>
            </select>
            <p style="font-size:12px; color:var(--accent); margin-bottom:5px;">Opção 1: Upload do PC (Gera Thumbnail Auto)</p>
            <input type="file" id="vFile" accept="video/*">
            <p style="font-size:12px; color:var(--accent); margin-bottom:5px;">Opção 2: Código Embed (Ex: iframe XNXX)</p>
            <input type="text" id="vEmbed" placeholder='Cole o código <iframe> aqui'>
            <button class="btn-main" id="upBtn" onclick="processUpload()">PUBLICAR AGORA</button>
        </section>

        <div class="video-grid" id="videoGrid"></div>
    </main>
</div>

<div class="player-overlay" id="playerModal">
    <div style="text-align:right; width:90%; max-width:1100px; margin-bottom:10px;">
        <button onclick="closePlayer()" style="background:red; color:white; border:none; padding:10px; cursor:pointer; border-radius:4px;">FECHAR X</button>
    </div>
    <div class="p-container" id="playerContainer"></div>
</div>

<canvas id="thumbCanvas" style="display:none;"></canvas>

<script>
    // --- CONFIGURAÇÃO FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBMlbl1DznEPxf1eOSsKRE2wHk5Jpw-2bc",
        authDomain: "makina-company.firebaseapp.com",
        databaseURL: "https://makina-company-default-rtdb.firebaseio.com",
        projectId: "makina-company",
        appId: "1:61683505551:web:5459aa3efb863c5388d3fa"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isLogin = true;

    // --- SESSÃO E SEGURANÇA ---
    window.onload = () => {
        const user = localStorage.getItem('activeUser');
        if(user) unlockSite();
    };

    function verifyAge() {
        document.getElementById('ageGate').style.display = 'none';
        if(!localStorage.getItem('activeUser')) document.getElementById('authModal').style.display = 'flex';
    }

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "Login" : "Cadastro";
        document.getElementById('authBtn').innerText = isLogin ? "ENTRAR" : "CADASTRAR";
    }

    function handleAuth() {
        const email = document.getElementById('uEmail').value.trim();
        const pass = document.getElementById('uPass').value.trim();
        if(!email || !pass) return alert("Preencha os campos!");

        if(isLogin) {
            db.ref('users').orderByChild('email').equalTo(email).once('value', snap => {
                if(snap.exists() && Object.values(snap.val())[0].pass === pass) {
                    localStorage.setItem('activeUser', email);
                    unlockSite();
                } else { alert("Acesso negado!"); }
            });
        } else {
            db.ref('users').push({ email, pass }).then(() => { alert("Conta criada!"); toggleAuth(); });
        }
    }

    function unlockSite() {
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('mainUI').classList.add('unlocked');
        render('Tudo');
    }

    function logout() { localStorage.clear(); location.reload(); }

    // --- BLOQUEIO REMOTO "DELEX" ---
    db.ref('settings/status').on('value', snap => {
        if(snap.val() === 'blocked') {
            document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:20%;'>SISTEMA BLOQUEADO: COMANDO DELEX ATIVO</h1>";
            document.body.style.background = "#000";
        }
    });

    // --- UPLOAD E THUMBNAIL ---
    function toggleUpload() {
        const box = document.getElementById('uploadSection');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    async function processUpload() {
        const title = document.getElementById('vTitle').value;
        const cat = document.getElementById('vCat').value;
        const file = document.getElementById('vFile').files[0];
        const embed = document.getElementById('vEmbed').value;
        const btn = document.getElementById('upBtn');

        if(!title || (!file && !embed)) return alert("Dados insuficientes!");

        btn.disabled = true; btn.innerText = "PROCESSANDO...";

        let finalUrl = "";
        let finalThumb = "https://via.placeholder.com/400x225/007bff/ffffff?text=DUKERHUB";
        let type = embed ? "embed" : "file";

        if(type === "file") {
            const reader = new FileReader();
            reader.onload = async (e) => {
                finalUrl = e.target.result;
                finalThumb = await generateAutoThumb(finalUrl);
                saveVideo(title, cat, finalUrl, finalThumb, "file");
            };
            reader.readAsDataURL(file);
        } else {
            // Extrair URL do iframe se o usuário colou o código todo
            const match = embed.match(/src="([^"]+)"/);
            finalUrl = match ? match[1] : embed;
            saveVideo(title, cat, finalUrl, finalThumb, "embed");
        }
    }

    function generateAutoThumb(url) {
        return new Promise(res => {
            const v = document.createElement('video');
            v.src = url; v.currentTime = 1; v.muted = true;
            v.onloadeddata = () => {
                setTimeout(() => {
                    const canvas = document.getElementById('thumbCanvas');
                    canvas.width = 400; canvas.height = 225;
                    canvas.getContext('2d').drawImage(v, 0, 0, 400, 225);
                    res(canvas.toDataURL('image/jpeg'));
                }, 500);
            };
        });
    }

    function saveVideo(title, cat, url, thumb, type) {
        db.ref('videos').push({ title, cat, url, thumb, type, date: Date.now() }).then(() => {
            alert("Vídeo publicado com sucesso!");
            location.reload();
        });
    }

    // --- RENDERIZAÇÃO E ANÚNCIOS ---
    function render(filter, el) {
        if(el) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = '';

        db.ref('videos').on('value', snap => {
            grid.innerHTML = '';
            let count = 0;
            snap.forEach(child => {
                const v = child.val();
                if(filter !== 'Tudo' && v.cat !== filter) return;

                // Injetar anúncio a cada 4 vídeos
                if(count > 0 && count % 4 === 0) {
                    grid.innerHTML += `<div class="ad-slot">PUBLICIDADE - MAKINA ADS</div>`;
                }

                const card = document.createElement('div');
                card.className = 'v-card';
                card.onclick = () => openPlayer(v.url, v.type);
                card.innerHTML = `
                    <div class="v-thumb"><img src="${v.thumb}"></div>
                    <div class="v-info">${v.title}</div>
                `;
                grid.appendChild(card);
                count++;
            });
        });
    }

    // --- PLAYER MULTIFUNCIONAL ---
    function openPlayer(url, type) {
        const modal = document.getElementById('playerModal');
        const container = document.getElementById('playerContainer');
        modal.classList.add('active');

        if(type === "embed") {
            container.innerHTML = `<iframe src="${url}" frameborder="0" scrolling="no" allowfullscreen></iframe>`;
        } else {
            // Player nativo com "simulação" de qualidade (os navegadores gerenciam via bitrate se disponível)
            container.innerHTML = `
                <video id="vSource" controls>
                    <source src="${url}" type="video/mp4">
                </video>
                <div style="background:#111; padding:10px; font-size:12px; display:flex; gap:10px;">
                    <span style="color:var(--primary)">Qualidade: Auto (HD)</span>
                </div>`;
            document.getElementById('vSource').play();
        }
    }

    function closePlayer() {
        document.getElementById('playerModal').classList.remove('active');
        document.getElementById('playerContainer').innerHTML = '';
    }
</script>

<footer style="text-align:center; padding:40px; color:#334155; font-size:13px;">
    © 2026 MAKINA COMPANY - CEO: Eng.makina
</footer>

</body>
</html>
