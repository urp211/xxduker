<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xxdukerhub | MAKINA company</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ff9900; /* Laranja Adulto */
            --bg: #050505;
            --card: #121212;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- TELAS DE BLOQUEIO --- */
        #ageGate, #authModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .gate-box, .auth-box { 
            width: 90%; max-width: 400px; padding: 40px; 
            background: var(--card); border: 1px solid #333; border-radius: 8px; 
        }

        /* --- HEADER --- */
        .header { background: #111; border-bottom: 2px solid var(--primary); padding: 15px; position: sticky; top: 0; z-index: 1000; }
        .header-container { max-width: 1500px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; font-weight: 900; text-decoration: none; color: #fff; }
        .logo span { background: var(--primary); color: #000; padding: 2px 6px; border-radius: 4px; }

        /* --- LAYOUT --- */
        .main-wrapper { 
            max-width: 1500px; margin: 20px auto; padding: 0 20px; display: flex; gap: 30px;
            filter: blur(20px); pointer-events: none; transition: 0.5s; 
        }
        .main-wrapper.unlocked { filter: blur(0); pointer-events: auto; }

        .sidebar { width: 180px; flex-shrink: 0; }
        .cat-item { cursor: pointer; padding: 10px; border-radius: 4px; transition: 0.2s; color: #888; font-weight: bold; }
        .cat-item:hover, .cat-item.active { background: #222; color: var(--primary); }

        /* --- COMPONENTES --- */
        .btn { background: var(--primary); border: none; padding: 12px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; color: #000; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .v-card { background: var(--card); border-radius: 4px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .v-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .v-thumb { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .v-info { padding: 12px; font-size: 14px; }

        /* --- MODAL PLAYER --- */
        .modal-player { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; align-items: center; justify-content: center; }
        .modal-player.active { display: flex; }
        video { width: 100%; max-height: 85vh; outline: none; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: var(--primary); font-size: 30px; cursor: pointer; font-weight: bold; }

        /* --- RESPONSIVO --- */
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; gap: 15px; }
            .sidebar { width: 100%; display: flex; flex-wrap: wrap; gap: 8px; }
            .sidebar h4 { width: 100%; }
            .video-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        }
    </style>
</head>
<body>

<div id="ageGate">
    <div class="gate-box">
        <div class="logo">XXDUKER<span>HUB</span></div>
        <p style="margin: 20px 0; color: #ccc;">Aviso: Este site contém conteúdo adulto. Tens mais de 18 anos?</p>
        <button class="btn" onclick="confirmAge()">SIM, TENHO +18</button>
        <p onclick="window.location.href='https://google.com'" style="margin-top:15px; font-size:12px; cursor:pointer; color:#555;">Sair</p>
    </div>
</div>

<div id="authModal" style="display:none;">
    <div class="auth-box">
        <h2 id="authTitle" style="color:var(--primary); margin-bottom:20px;">Membros MAKINA</h2>
        <input type="email" id="authEmail" placeholder="E-mail">
        <input type="password" id="authPass" placeholder="Palavra-passe">
        <button class="btn" onclick="handleAuth()" id="authBtn">ENTRAR</button>
        <p style="margin-top:15px; font-size:12px; color:#888;">
            <span id="toggleText">Novo aqui?</span> <a href="#" onclick="toggleAuth()" style="color:var(--primary); text-decoration:none;">Criar conta</a>
        </p>
    </div>
</div>

<header class="header">
    <div class="header-container">
        <a href="#" class="logo" onclick="location.reload()">XXDUKER<span>HUB</span></a>
        <div id="navRight">
            <span id="userDisp" style="font-size:12px; color:#666; margin-right:15px;"></span>
            <button onclick="logout()" style="background:none; border:1px solid #444; color:#fff; padding:5px 10px; cursor:pointer; border-radius:4px;">SAIR</button>
        </div>
    </div>
</header>

<div class="main-wrapper" id="mainUI">
    <aside class="sidebar">
        <h4 style="color:#444; margin-bottom:15px; font-size:12px;">CATEGORIAS</h4>
        <div class="cat-item active" onclick="render('Tudo', this)">Tudo</div>
        <div class="cat-item" onclick="render('Premium', this)">Premium</div>
        <div class="cat-item" onclick="render('Amador', this)">Amador</div>
        <div class="cat-item" onclick="render('Caseiro', this)">Caseiro</div>
    </aside>

    <main class="content">
        <div class="video-grid" id="videoGrid">
            </div>
    </main>
</div>

<div class="modal-player" id="playerModal">
    <div class="close-btn" onclick="closePlayer()">&times;</div>
    <video id="mainVid" controls controlsList="nodownload"></video>
</div>

<script>
    // --- CONFIGURAÇÃO FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBMlbl1DznEPxf1eOSsKRE2wHk5Jpw-2bc",
        authDomain: "makina-company.firebaseapp.com",
        databaseURL: "https://makina-company-default-rtdb.firebaseio.com",
        projectId: "makina-company",
        appId: "1:61683505551:web:5459aa3efb863c5388d3fa"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isLogin = true;

    // --- LOGICA DE ACESSO ---
    window.onload = () => {
        if(sessionStorage.getItem('activeUser')) {
            document.getElementById('ageGate').style.display = 'none';
            unlock(sessionStorage.getItem('activeUser'));
        }
    };

    function confirmAge() {
        document.getElementById('ageGate').style.display = 'none';
        document.getElementById('authModal').style.display = 'flex';
    }

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "Membros MAKINA" : "Criar Conta";
        document.getElementById('authBtn').innerText = isLogin ? "ENTRAR" : "CADASTRAR";
        document.getElementById('toggleText').innerText = isLogin ? "Novo aqui?" : "Já tens conta?";
    }

    function handleAuth() {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPass').value;
        if(!email || !pass) return alert("Preencha os campos!");

        if(isLogin) {
            db.ref('users').orderByChild('email').equalTo(email).once('value', snapshot => {
                if(snapshot.exists()) {
                    const userData = Object.values(snapshot.val())[0];
                    if(userData.pass === pass) {
                        sessionStorage.setItem('activeUser', email);
                        unlock(email);
                    } else { alert("Senha incorreta!"); }
                } else { alert("Usuário não encontrado!"); }
            });
        } else {
            db.ref('users').push({ email, pass }).then(() => {
                alert("Conta criada! Já podes entrar.");
                toggleAuth();
            });
        }
    }

    function unlock(email) {
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('mainUI').classList.add('unlocked');
        document.getElementById('userDisp').innerText = email;
        render('Tudo');
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    // --- UTILIDADES ---
    function escapeHTML(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    // --- RENDERIZAÇÃO DE VÍDEOS ---
    function render(filter, el) {
        if(el) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        const grid = document.getElementById('videoGrid');
        grid.innerHTML = '<p style="color:#444">A carregar conteúdo...</p>';

        db.ref('videos').once('value', snapshot => {
            grid.innerHTML = '';
            snapshot.forEach(child => {
                const v = child.val();
                if(filter !== 'Tudo' && v.cat !== filter) return;

                const card = document.createElement('div');
                card.className = 'v-card';
                card.onclick = () => playVideo(v.url || '');
                card.innerHTML = `
                    <div class="v-thumb">
                        <img src="${escapeHTML(v.thumb || '')}" alt="${escapeHTML(v.title || '')}" onerror="this.src='https://via.placeholder.com/400x225/111/444?text=XXDUKER'">
                    </div>
                    <div class="v-info">
                        <b style="color:var(--primary)">${escapeHTML(v.cat || '')}</b><br>
                        <span>${escapeHTML(v.title || '')}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        });
    }

    function playVideo(url) {
        const modal = document.getElementById('playerModal');
        const video = document.getElementById('mainVid');
        video.src = url;
        modal.classList.add('active');
        video.play();
    }

    function closePlayer() {
        const modal = document.getElementById('playerModal');
        const video = document.getElementById('mainVid');
        modal.classList.remove('active');
        video.pause();
        video.src = "";
    }
</script>

<footer style="text-align:center; padding:40px; color:#222; font-size:12px;">
    @MAKINA COMPANY - XXDUKERHUB 2026
</footer>

</body>
</html>
