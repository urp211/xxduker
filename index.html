<script>
    // --- CONFIGURAÇÃO FIREBASE ---
    const firebaseConfig = {

        appId: "1:61683505551:web:5459aa3efb863c5388d3fa"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isLogin = true;

    // --- LOGICA DE ACESSO ---
    window.onload = () => {
        const savedUser = sessionStorage.getItem('activeUser');
        if(savedUser) {
            document.getElementById('ageGate').style.display = 'none';
            document.getElementById('authModal').style.display = 'none';
            unlock(savedUser);
        }
    };

    function confirmAge() {
        document.getElementById('ageGate').style.display = 'none';
        document.getElementById('authModal').style.display = 'flex';
    }

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "Membros MAKINA" : "Criar Conta";
        document.getElementById('authBtn').innerText = isLogin ? "ENTRAR" : "CADASTRAR";
        document.getElementById('toggleText').innerText = isLogin ? "Novo aqui?" : "Já tens conta?";
    }

    function handleAuth() {
        const email = document.getElementById('authEmail').value.trim();
        const pass = document.getElementById('authPass').value.trim();
        const btn = document.getElementById('authBtn');

        if(!email || !pass) {
            alert("Por favor, preenche todos os campos.");
            return;
        }

        btn.innerText = "A PROCESSAR...";
        btn.disabled = true;

        if(isLogin) {
            // LÓGICA DE LOGIN
            db.ref('users').orderByChild('email').equalTo(email).once('value')
                .then((snapshot) => {
                    if(snapshot.exists()) {
                        const userData = Object.values(snapshot.val())[0];
                        if(userData.pass === pass) {
                            sessionStorage.setItem('activeUser', email);
                            unlock(email);
                        } else {
                            alert("Palavra-passe errada!");
                            resetBtn();
                        }
                    } else {
                        alert("Utilizador não encontrado!");
                        resetBtn();
                    }
                })
                .catch((error) => {
                    alert("Erro na ligação: " + error.message);
                    resetBtn();
                });
        } else {
            // LÓGICA DE CADASTRO
            db.ref('users').push({ email, pass })
                .then(() => {
                    alert("Conta criada com sucesso! Agora podes entrar.");
                    isLogin = true;
                    toggleAuth();
                    resetBtn();
                })
                .catch((error) => {
                    alert("Erro ao criar conta: " + error.message);
                    resetBtn();
                });
        }
    }

    function resetBtn() {
        const btn = document.getElementById('authBtn');
        btn.innerText = isLogin ? "ENTRAR" : "CADASTRAR";
        btn.disabled = false;
    }

    function unlock(email) {
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('mainUI').classList.add('unlocked');
        document.getElementById('userDisp').innerText = email;
        render('Tudo');
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    // --- RENDERIZAÇÃO DE VÍDEOS ---
    function render(filter, el) {
        if(el) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        const grid = document.getElementById('videoGrid');
        grid.innerHTML = '<p style="color:#444; padding:20px;">A carregar catálogo...</p>';

        db.ref('videos').on('value', snapshot => {
            grid.innerHTML = '';
            if(!snapshot.exists()) {
                grid.innerHTML = '<p style="color:#444; padding:20px;">Nenhum conteúdo disponível ainda.</p>';
                return;
            }
            snapshot.forEach(child => {
                const v = child.val();
                if(filter !== 'Tudo' && v.cat !== filter) return;

                const card = document.createElement('div');
                card.className = 'v-card';
                card.onclick = () => playVideo(v.url);
                card.innerHTML = `
                    <div class="v-thumb">
                        <img src="${v.thumb}" onerror="this.src='https://via.placeholder.com/400x225/111/444?text=XXDUKER'">
                    </div>
                    <div class="v-info">
                        <b style="color:var(--primary)">${v.cat}</b><br>
                        <span>${v.title}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        });
    }

    function playVideo(url) {
        const modal = document.getElementById('playerModal');
        const video = document.getElementById('mainVid');
        video.src = url;
        modal.classList.add('active');
        video.play();
    }

    function closePlayer() {
        const modal = document.getElementById('playerModal');
        const video = document.getElementById('mainVid');
        modal.classList.remove('active');
        video.pause();
        video.src = "";
    }
</script>
